paths:
  parquet:         "data/sair.parquet"
  esm_cache:       "data/esm_embeddings/"
  residue_cache:   null
  chem_emb_cache:  "data/chem_emb_cache.pt"
  annotations:     "data/long_protein_annotations.csv"
  splits:          "data/splits/"
  checkpoints:     "checkpoints/chemberta/"

data:
  filter_all_passed: true
  assay_filter:      "biochem"
  deduplicate:       true

esm:
  model_name:   "esm2_t33_650M_UR50D"
  esm_dim:      1280   # output dim of 650M model; use 480 for 150M
  attn_dim:     256    # cross-attention projection dim
  max_residues: 1022   # ESM2 hard limit

chem_encoder:
  model_name:  "seyonec/ChemBERTa-zinc-base-v1"
  chem_dim:    768    # ChemBERTa CLS token dim
  proj_dim:    256    # projected dim for fusion
  dropout:     0.1

protein_family:
  n_families:  6      # kinase, enzyme, GPCR, nuclear receptor, phosphatase, other
  embed_dim:   16

model:
  fusion_hidden_dim: 512
  dropout:           0.1

training:
  normalize_targets: false   # per-protein zero-mean/unit-std normalization; false = raw pIC50
  checkpoint_monitor: "spearman"   # "spearman" (stable, 41k samples) or "per_protein_spearman"
  batch_size:      128
  epochs:          50
  learning_rate:   1.0e-4
  weight_decay:    1.0e-5
  scheduler:       "cosine"    # "cosine" (per-step) or "plateau" (per-epoch on val loss)
  huber_delta:     1.0
  ranking_loss:    true
  ranking_weight:  0.1
  ranking_margin:  0.5
  patience:        15          # early stopping epochs without per_protein_spearman improvement
  grad_clip:       1.0         # max gradient norm (0 to disable)
  mixed_precision: true        # torch.autocast — significant speedup on A100 Tensor Cores

logging:
  wandb_project:     "sair-ic50-oracle"
  wandb_entity:      null      # set to your wandb username
  log_every_n_steps: 50
