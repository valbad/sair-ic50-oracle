paths:
  parquet:        "data/sair.parquet"
  esm_cache:      "data/esm_embeddings/"
  residue_cache:  null
  ligand_cache:   "data/ligand_cache.pt"
  annotations:    "data/long_protein_annotations.csv"
  splits:         "data/splits/"
  checkpoints:    "checkpoints/baseline/"

data:
  filter_all_passed: true
  assay_filter:      "biochem"
  deduplicate:       true

esm:
  model_name:   "esm2_t33_650M_UR50D"
  esm_dim:      1280   # output dim of 650M model; use 480 for 150M
  attn_dim:     256    # cross-attention projection dim (keys/queries/values)
  max_residues: 1022   # ESM2 hard limit — load full sequence, no artificial truncation

ligand_gnn:
  node_dim:      14    # ATOM_FEATURE_DIM — do not change without updating featurise.py
  edge_dim:      3     # BOND_FEATURE_DIM — do not change without updating featurise.py
  hidden_dim:    256
  n_layers:      4
  dropout:       0.1
  descriptor_dim: 12   # DESCRIPTOR_DIM — global RDKit physicochemical features

model:
  fusion_hidden_dim: 512
  dropout:           0.1

training:
  batch_size:      128
  epochs:          50
  learning_rate:   1.0e-4
  weight_decay:    1.0e-5
  scheduler:       "cosine"    # "cosine" (per-step) or "plateau" (per-epoch on val loss)
  huber_delta:     1.0
  ranking_loss:    true
  ranking_weight:  0.1
  ranking_margin:  0.5
  patience:        15          # early stopping epochs without per_protein_spearman improvement
  grad_clip:       1.0         # max gradient norm (0 to disable)
  mixed_precision: true        # torch.autocast — significant speedup on A100 Tensor Cores

logging:
  wandb_project:     "sair-ic50-oracle"
  wandb_entity:      null      # set to your wandb username
  log_every_n_steps: 50
