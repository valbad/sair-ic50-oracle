# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  # Raw SAIR parquet - adjust for local vs Colab
  parquet: "~/Library/CloudStorage/GoogleDrive-badea3889@gmail.com/My Drive/sair-data/sair.parquet"
  # Where precomputed ESM2 embeddings will be saved (one .pt file per protein)
  esm_cache: "~/Library/CloudStorage/GoogleDrive-badea3889@gmail.com/My Drive/sair-data/esm_embeddings/"
  # Train/val/test split index files
  splits: "data/splits/"
  # Checkpoints
  checkpoints: "checkpoints/"

# ─── Data ─────────────────────────────────────────────────────────────────────
data:
  # Only keep rows that passed all PoseBusters checks
  filter_all_passed: true
  # Only use biochemical assays (cleanest signal), set to null to use all
  assay_filter: "biochemical"
  # Deduplicate: one row per unique (sequence, SMILES) pair
  deduplicate: true
  # Train/val/test split ratios (by unique protein cluster)
  split_ratios: [0.8, 0.1, 0.1]
  # Random seed for splits
  seed: 42

# ─── ESM2 ─────────────────────────────────────────────────────────────────────
esm:
  # Options: esm2_t6_8M_UR50D, esm2_t12_35M_UR50D, esm2_t30_150M_UR50D,
  #          esm2_t33_650M_UR50D (recommended), esm2_t36_3B_UR50D
  model_name: "esm2_t33_650M_UR50D"
  # Pooling strategy over residue embeddings: mean, cls, max
  pooling: "mean"
  # Batch size for precomputation (reduce if OOM)
  batch_size: 16
  # Device: auto detects mps on Apple Silicon, cuda on Colab
  device: "auto"

# ─── Ligand GNN ───────────────────────────────────────────────────────────────
ligand_gnn:
  # Number of atom features (computed by RDKit)
  node_features: 9
  # Number of bond features
  edge_features: 3
  # Hidden dimension
  hidden_dim: 256
  # Number of message passing layers
  num_layers: 4
  # Dropout
  dropout: 0.1

# ─── Model ────────────────────────────────────────────────────────────────────
model:
  # Protein embedding dim (must match ESM2 model output)
  protein_dim: 1280   # 650M model; use 480 for 150M, 768 for 3B
  # Ligand GNN output dim
  ligand_dim: 256
  # MLP hidden dim after fusion
  fusion_hidden_dim: 512
  # Output: single pIC50 value
  output_dim: 1
  dropout: 0.1

# ─── Training ─────────────────────────────────────────────────────────────────
training:
  batch_size: 256
  epochs: 50
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  # Scheduler: cosine or plateau
  scheduler: "cosine"
  # Loss: mse or huber
  loss: "huber"
  # Add ranking loss within same-protein batches
  ranking_loss: true
  ranking_loss_weight: 0.1
  # Early stopping patience (epochs)
  patience: 10

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  wandb_project: "sair-ic50-oracle"
  wandb_entity: null   # set to your wandb username
  log_every_n_steps: 50
